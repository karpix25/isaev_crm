worker_processes 2;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    map $http_x_forwarded_proto $proxy_forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    map $http_x_forwarded_port $proxy_forwarded_port {
        default $http_x_forwarded_port;
        "" $server_port;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # API proxy (backend is the `app` service in docker-compose)
        location = /api {
            return 308 /api/;
        }

        location ^~ /api/ {
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
            proxy_read_timeout 60s;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    server {
        listen 80;
        server_name quiz.isaevremont.ru www.quiz.isaevremont.ru;

        root /usr/share/nginx/html;
        index quiz-remont.html;

        location = / {
            try_files /quiz-remont.html =404;
        }

        location = /quiz-remont.html {
            try_files /quiz-remont.html =404;
        }

        location = /ig {
            return 302 /quiz-remont.html?utm_source=instagram&utm_medium=bio&utm_campaign=quiz_profile&utm_content=instagram_header;
        }

        location = /instagram {
            return 302 /quiz-remont.html?utm_source=instagram&utm_medium=bio&utm_campaign=quiz_profile&utm_content=instagram_header;
        }

        location = /ig-stories {
            return 302 /quiz-remont.html?utm_source=instagram&utm_medium=stories&utm_campaign=quiz_stories&utm_content=instagram_story;
        }

        location = /inst-stories {
            return 302 /quiz-remont.html?utm_source=instagram&utm_medium=stories&utm_campaign=quiz_stories&utm_content=instagram_story;
        }

        location = /stories {
            return 302 /quiz-remont.html?utm_source=instagram&utm_medium=stories&utm_campaign=quiz_stories&utm_content=instagram_story;
        }

        location = /yt {
            return 302 /quiz-remont.html?utm_source=youtube&utm_medium=bio&utm_campaign=quiz_profile&utm_content=youtube_header;
        }

        location = /youtube {
            return 302 /quiz-remont.html?utm_source=youtube&utm_medium=bio&utm_campaign=quiz_profile&utm_content=youtube_header;
        }

        location = /tg {
            return 308 /tg/telegram-direct;
        }

        location ^~ /tg/ {
            proxy_pass http://app:8000/api/tg/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
            proxy_read_timeout 20s;
        }

        location = /api {
            return 308 /api/;
        }

        location ^~ /api/ {
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
            proxy_read_timeout 60s;
        }

        location ^~ /assets/ {
            try_files $uri =404;
        }

        location / {
            try_files /quiz-remont.html =404;
        }
    }
}

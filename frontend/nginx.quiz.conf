worker_processes 2;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    map $http_x_forwarded_proto $proxy_forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    map $http_x_forwarded_port $proxy_forwarded_port {
        default $http_x_forwarded_port;
        "" $server_port;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index quiz-remont.html;

        location = / {
            return 302 /quiz-remont;
        }

        location = /quiz-remont {
            try_files /quiz-remont.html =404;
        }

        location ^~ /quiz-remont/ {
            try_files /quiz-remont.html =404;
        }

        location = /quiz-remont.html {
            try_files /quiz-remont.html =404;
        }

        location = /ig {
            return 302 /quiz-remont?utm_source=instagram&utm_medium=bio&utm_campaign=quiz_profile&utm_content=instagram_header;
        }

        location = /instagram {
            return 302 /quiz-remont?utm_source=instagram&utm_medium=bio&utm_campaign=quiz_profile&utm_content=instagram_header;
        }

        location = /ig-stories {
            return 302 /quiz-remont?utm_source=instagram&utm_medium=stories&utm_campaign=quiz_stories&utm_content=instagram_story;
        }

        location = /inst-stories {
            return 302 /quiz-remont?utm_source=instagram&utm_medium=stories&utm_campaign=quiz_stories&utm_content=instagram_story;
        }

        location = /stories {
            return 302 /quiz-remont?utm_source=instagram&utm_medium=stories&utm_campaign=quiz_stories&utm_content=instagram_story;
        }

        location = /yt {
            return 302 /quiz-remont?utm_source=youtube&utm_medium=bio&utm_campaign=quiz_profile&utm_content=youtube_header;
        }

        location = /youtube {
            return 302 /quiz-remont?utm_source=youtube&utm_medium=bio&utm_campaign=quiz_profile&utm_content=youtube_header;
        }

        location = /tg {
            return 308 /tg/telegram-direct;
        }

        location ^~ /tg/ {
            proxy_pass https://isaev-back.karpix.com/api/tg/;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header Host isaev-back.karpix.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
            proxy_read_timeout 20s;
        }

        location = /vite.svg {
            try_files /vite.svg =404;
        }

        location ^~ /assets/ {
            try_files $uri =404;
        }

        location = /api {
            return 308 /api/;
        }

        location ^~ /api/ {
            proxy_pass https://isaev-back.karpix.com;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host isaev-back.karpix.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
            proxy_read_timeout 60s;
        }

        location = /qph {
            return 308 /qph/;
        }

        location ^~ /qph/static/ {
            proxy_pass https://us-assets.i.posthog.com/static/;
            proxy_ssl_server_name on;
            proxy_ssl_name us-assets.i.posthog.com;
            proxy_http_version 1.1;
            proxy_set_header Host us-assets.i.posthog.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin "*" always;
            proxy_read_timeout 60s;
        }

        location ^~ /qph/array/ {
            proxy_pass https://us-assets.i.posthog.com/array/;
            proxy_ssl_server_name on;
            proxy_ssl_name us-assets.i.posthog.com;
            proxy_http_version 1.1;
            proxy_set_header Host us-assets.i.posthog.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin "*" always;
            proxy_read_timeout 60s;
        }

        location ^~ /qph/ {
            proxy_pass https://us.i.posthog.com/;
            proxy_ssl_server_name on;
            proxy_ssl_name us.i.posthog.com;
            proxy_http_version 1.1;
            proxy_set_header Host us.i.posthog.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin "*" always;
            proxy_read_timeout 60s;
        }

        location / {
            return 302 /quiz-remont;
        }
    }
}

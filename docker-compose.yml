name: renovation-crm

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - default

  app:
    build: .
    restart: always
    env_file: .env
    networks:
      - default
    depends_on:
      - db
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  userbot:
    build: .
    command: python run_user_bot.py
    restart: always
    env_file: .env
    depends_on:
      - app
      - db
      - redis
    networks:
      - default

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - app
    networks:
      - default

networks:
  default:
    external: true
    name: easypanel

volumes:
  postgres_data:
  redis_data:
